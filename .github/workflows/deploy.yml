name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - source # Trigger this workflow when pushing to the source branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3
        with:
          ref: source # Checkout the 'source' branch we just created

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate static files
        run: npx hexo generate

      - name: Deploy to Master branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: master # Important: It publishes the generated HTML back to master
          commit_message: "chore: auto-deploy from Hexo source"
